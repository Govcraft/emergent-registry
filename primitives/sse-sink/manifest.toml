# SSE Sink Primitive Manifest

[primitive]
name = "sse-sink"
version = "0.6.1"
kind = "sink"
description = "Push pipeline events to browsers via Server-Sent Events"
homepage = "https://github.com/Govcraft/emergent-primitives"
license = "MIT"

[messages]
subscribes = ["*"]

# CLI Arguments
[[args]]
name = "port"
long = "port"
short = "p"
required = false
description = "HTTP port for SSE connections (default: 8080)"

# Binary Downloads
[binaries]
release_url = "https://github.com/Govcraft/emergent-primitives/releases"

[binaries.checksums]
x86_64-unknown-linux-gnu = ""
aarch64-unknown-linux-gnu = ""
x86_64-apple-darwin = ""
aarch64-apple-darwin = ""

[binaries.targets]
x86_64-unknown-linux-gnu = "sse-sink-0.6.1-x86_64-unknown-linux-gnu.tar.gz"
aarch64-unknown-linux-gnu = "sse-sink-0.6.1-aarch64-unknown-linux-gnu.tar.gz"
x86_64-apple-darwin = "sse-sink-0.6.1-x86_64-apple-darwin.tar.gz"
aarch64-apple-darwin = "sse-sink-0.6.1-aarch64-apple-darwin.tar.gz"
