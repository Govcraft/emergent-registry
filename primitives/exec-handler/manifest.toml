# Exec Handler Primitive Manifest

[primitive]
name = "exec-handler"
version = "0.3.10"
kind = "handler"
description = "Subscribe to events, pipe payloads through an executable, publish results"
homepage = "https://github.com/govcraft/emergent-primitives"
license = "MIT"

[messages]
subscribes = ["*"]
publishes = ["exec.output", "exec.error"]

# CLI Arguments
[[args]]
name = "publish-as"
long = "publish-as"
short = "p"
required = false
description = "Message type for successful output (default: exec.output)"

[[args]]
name = "error-as"
long = "error-as"
short = "e"
required = false
description = "Message type for error output (default: exec.error)"

[[args]]
name = "timeout"
long = "timeout"
short = "t"
required = false
description = "Per-execution timeout in milliseconds (default: 30000)"

# Binary Downloads
[binaries]
release_url = "https://github.com/Govcraft/emergent-primitives/releases"

[binaries.checksums]
x86_64-unknown-linux-gnu = ""
aarch64-unknown-linux-gnu = ""
x86_64-apple-darwin = ""
aarch64-apple-darwin = ""
x86_64-pc-windows-msvc = ""

[binaries.targets]
x86_64-unknown-linux-gnu = "exec-handler-0.3.10-x86_64-unknown-linux-gnu.tar.gz"
aarch64-unknown-linux-gnu = "exec-handler-0.3.10-aarch64-unknown-linux-gnu.tar.gz"
x86_64-apple-darwin = "exec-handler-0.3.10-x86_64-apple-darwin.tar.gz"
aarch64-apple-darwin = "exec-handler-0.3.10-aarch64-apple-darwin.tar.gz"
x86_64-pc-windows-msvc = "exec-handler-0.3.10-x86_64-pc-windows-msvc.zip"
