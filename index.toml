# Emergent Official Registry
# This file indexes all available primitives in the marketplace

[registry]
name = "emergent-official"
version = "1.0.0"
description = "Official Emergent primitives registry"

# HTTP Integration
[[primitives]]
name = "http-source"
version = "0.4.1"
kind = "source"
description = "Generic HTTP webhook receiver"
publishes = ["http.request"]
tags = ["http", "webhooks", "api"]

# Exec Integration
[[primitives]]
name = "exec-source"
version = "0.4.1"
kind = "source"
description = "Execute shell commands and emit output as events"
publishes = ["exec.output", "exec.error", "exec.exit"]
tags = ["exec", "shell", "command"]

[[primitives]]
name = "exec-handler"
version = "0.4.1"
kind = "handler"
description = "Pipe event payloads through any executable and publish results"
subscribes = ["*"]
publishes = ["exec.output", "exec.error"]
tags = ["exec", "shell", "command", "transform"]

[[primitives]]
name = "exec-sink"
version = "0.4.1"
kind = "sink"
description = "Pipe event payloads through any executable (fire-and-forget)"
subscribes = ["*"]
tags = ["exec", "shell", "command", "console", "output"]
