# Emergent Official Registry
# This file indexes all available primitives in the marketplace

[registry]
name = "emergent-official"
version = "1.0.0"
description = "Official Emergent primitives registry"

# HTTP Integration
[[primitives]]
name = "http-source"
version = "0.7.0"
kind = "source"
description = "Generic HTTP webhook receiver"
publishes = ["http.request"]
tags = ["http", "webhooks", "api"]

# Exec Integration
[[primitives]]
name = "exec-source"
version = "0.7.0"
kind = "source"
description = "Execute shell commands and emit output as events"
publishes = ["exec.output", "exec.error", "exec.exit"]
tags = ["exec", "shell", "command"]

[[primitives]]
name = "exec-handler"
version = "0.7.0"
kind = "handler"
description = "Pipe event payloads through any executable and publish results"
subscribes = ["*"]
publishes = ["exec.output", "exec.error"]
tags = ["exec", "shell", "command", "transform"]

[[primitives]]
name = "exec-sink"
version = "0.7.0"
kind = "sink"
description = "Pipe event payloads through any executable (fire-and-forget)"
subscribes = ["*"]
tags = ["exec", "shell", "command", "console", "output"]

# SSE (Server-Sent Events)
[[primitives]]
name = "sse-sink"
version = "0.7.0"
kind = "sink"
description = "Push pipeline events to browsers via Server-Sent Events"
subscribes = ["*"]
tags = ["sse", "realtime", "browser", "dashboard", "monitoring"]

# Visualization
[[primitives]]
name = "topology-viewer"
version = "0.7.0"
kind = "sink"
description = "Real-time workflow visualization with D3.js force-directed graph"
subscribes = ["system.started.*", "system.stopped.*", "system.error.*", "system.response.topology"]
tags = ["visualization", "monitoring", "dashboard", "d3"]

# WebSocket Integration
[[primitives]]
name = "websocket-handler"
version = "0.7.0"
kind = "handler"
description = "Bidirectional WebSocket bridge for Emergent pipelines"
subscribes = ["ws.connect", "ws.send", "ws.disconnect"]
publishes = ["ws.connected", "ws.frame", "ws.closed", "ws.error"]
tags = ["websocket", "ws", "realtime", "bidirectional"]
